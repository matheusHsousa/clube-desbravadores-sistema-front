<div class="edit-sheet" #sheet>
  <header (pointerdown)="startDrag($event)">
    <h2>Editar Marcação</h2>
  </header>

  <form class="edit-form" [formGroup]="editForm">
    <div class="field-row">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Data (domingo)</mat-label>
        <input matInput [matDatepicker]="editSundayPicker" formControlName="sundayDate" [matDatepickerFilter]="onlySundays" />
        <mat-datepicker-toggle matIconSuffix [for]="editSundayPicker"></mat-datepicker-toggle>
        <mat-datepicker #editSundayPicker></mat-datepicker>
      </mat-form-field>
    </div>

    <div class="criteria-grid">
      <div class="reason-card" *ngFor="let key of ['presence','pontualidade','uniforme','material','classe','espEquipe','disciplina','textoBiblico']">
        <div class="card-header">
          <div class="title">{{ key === 'espEquipe' ? 'Espírito' : (key === 'textoBiblico' ? 'Texto Bíblico' : (key | titlecase)) }}</div>
        </div>
        <div class="card-body">
          <mat-radio-group [formControlName]="key" [disabled]="key === 'textoBiblico'">
            <mat-radio-button *ngFor="let o of getOptions(key)" [value]="o">{{ o }}</mat-radio-button>
          </mat-radio-group>
        </div>
      </div>
    </div>

    <div class="actions">
      <button mat-button type="button" class="btn-cancel" (click)="cancel()">Cancelar</button>
      <button mat-raised-button type="button" class="btn-primary" (click)="save()" [disabled]="editForm.invalid">Salvar</button>
    </div>
  </form>
</div>
