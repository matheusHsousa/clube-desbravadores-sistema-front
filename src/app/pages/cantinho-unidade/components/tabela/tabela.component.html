<section class="panel">
  <h2>Tabela de Pontos da Unidade</h2>
  <mat-card>
    <mat-card-content>
      <div class="table-responsive">
        <table class="points-table">
          <thead>
            <tr>
              <th>Nome</th>
              <th class="saldo">Saldo</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let d of desbravadores" [class.updated]="parent.rowUpdatedId === d.id">
              <td class="name">{{ d.name }}</td>
              <td class="saldo">{{ pointsMap[d.id] }}</td>
            </tr>
          </tbody>
        </table>
      </div>
      <div *ngIf="!desbravadores?.length" class="empty">Nenhum desbravador encontrado.</div>
    </mat-card-content>
  </mat-card>
</section>
